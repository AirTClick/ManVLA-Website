<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Midterm videos</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1114;
      --card: #1a1d23;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #8ab4f8;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 2rem 1.5rem 1rem;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    header h1 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
      font-weight: 600;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }
    section {
      background: var(--card);
      border-radius: 12px;
      padding: 1.25rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    section h2 {
      margin: 0 0 1rem;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    video {
      width: 100%;
      max-height: 70vh;
      border-radius: 8px;
      background: #000;
    }
  </style>
</head>
<body>
  <header>
    <h1>16831 Project Videos Midterm</h1>
    <p>Three runs: random baseline, PPO, and SAC</p>
  </header>
  <main>
    <section>
      <h2>random_seed0</h2>
      <video controls playsinline preload="metadata">
        <source src="random_seed0/0.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </section>
    <section>
      <h2>ppo_50k_s0</h2>
      <video controls playsinline preload="metadata">
        <source src="ppo_50k_s0/0.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </section>
    <section>
      <h2>sac_50k_s0</h2>
      <video controls playsinline preload="metadata">
        <source src="sac_50k_s0/0.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </section>
  </main>
</body>
</html>
